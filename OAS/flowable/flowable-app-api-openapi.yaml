  /cmmn-runtime/case-instances/{caseInstanceId}/variables:
    get:
      tags:
      - Case Instance Variables
      summary: List variables for a case instance
      description: "In case the variable is a binary variable or serializable, the\
        \ valueUrl points to an URL to fetch the raw value. If it’s a plain variable,\
        \ the value is present in the response. Note that only local scoped variables\
        \ are returned, as there is no global scope for case-instance variables."
      operationId: listCaseInstanceVariables
      parameters:
      - name: caseInstanceId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Indicates the case instance was found and variables are returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RestVariable'
        "400":
          description: Indicates the requested case instance was not found.
          content: {}
      security:
      - basicAuth: []
    put:
      tags:
      - Case Instance Variables
      summary: Update a multiple/single (non)binary variable on a case instance
      description: |-
        This endpoint can be used in 2 ways: By passing a JSON Body (RestVariable or an array of RestVariable) or by passing a multipart/form-data Object.
        Nonexistent variables are created on the case-instance and existing ones are overridden without any error.
        Any number of variables can be passed into the request body array.
        Note that scope is ignored, only global variables can be set in a case instance.
        NB: Swagger V2 specification doesn't support this use case that is why this endpoint might be buggy/incomplete if used with other tools.
      operationId: createOrUpdateCaseVariable
      parameters:
      - name: caseInstanceId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                name:
                  type: string
                  example: Simple content item
                type:
                  type: string
                  example: integer
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                name:
                  type: string
                  example: Simple content item
                type:
                  type: string
                  example: integer
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
        "201":
          description: Indicates the case instance was found and variable is created.
          content: {}
        "400":
          description: Indicates the request body is incomplete or contains illegal
            values. The status description contains additional information about the
            error.
          content: {}
        "404":
          description: Indicates the requested case instance was not found.
          content: {}
        "415":
          description: Indicates the serializable data contains an object for which
            no class is present in the JVM running the Flowable engine and therefore
            cannot be deserialized.
          content: {}
      security:
      - basicAuth: []
    post:
      tags:
      - Case Instance Variables
      summary: Create variables or new binary variable on a case instance
