  /cmmn-runtime/plan-item-instances/{planItemInstanceId}/variables/{variableName}/data:
    get:
      tags:
      - Plan Item Instance Variables
      summary: Get the binary data for a variable
      operationId: getPlanItemInstanceVariableData
      parameters:
      - name: planItemInstanceId
        in: path
        required: true
        schema:
          type: string
      - name: variableName
        in: path
        required: true
        schema:
          type: string
      - name: scope
        in: query
        schema:
          type: string
