        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                name:
                  type: string
                  example: intProcVar
                type:
                  type: string
                  example: integer
                scope:
                  type: string
                  example: global
