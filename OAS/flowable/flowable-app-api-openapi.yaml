          type: boolean
      - name: withoutProcessInstanceId
        in: query
        description: "If true, only returns historic task instances without a process\
          \ instance id set. If false, the withoutProcessInstanceId parameter is ignored."
        schema:
          type: boolean
      - name: planItemInstanceId
        in: query
        description: The plan item instance instance id of the historic task instance.
        schema:
          type: string
      - name: rootScopeId
        in: query
        description: Only return case instances which have the given root scope id
          (that can be a process or case instance ID).
        schema:
          type: string
      - name: parentScopeId
        in: query
        description: Only return case instances which have the given parent scope
          id (that can be a process or case instance ID).
        schema:
          type: string
