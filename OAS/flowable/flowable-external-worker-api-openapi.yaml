openapi: 3.0.1
info:
  title: Flowable External Worker Job REST API
  description: "# flowable / flowəb(ə)l /\r\n\r\n- a compact and highly efficient\
    \ workflow and Business Process Management (BPM) platform for developers, system\
    \ admins and business users.\r\n- a lightning fast, tried and tested BPMN 2 process\
    \ engine written in Java. It is Apache 2.0 licensed open source, with a committed\
    \ community.\r\n- can run embedded in a Java application, or as a service on a\
    \ server, a cluster, and in the cloud. It integrates perfectly with Spring. With\
    \ a rich Java and REST API, it is the ideal engine for orchestrating human or\
    \ system activities."
  contact:
    name: Flowable
    url: http://www.flowable.org/
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: v1
servers:
- url: /flowable-rest/external-job-api
tags:
- name: Acquire and Execute
- name: Info and Query
- name: Unacquire
paths:
  /acquire/jobs:
    post:
      tags:
      - Acquire and Execute
      summary: Acquire External Worker Jobs
      operationId: acquireAndLockJobs
      requestBody:
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/AcquireExternalWorkerJobRequest'
        required: false
      responses:
        "200":
          description: Indicates the jobs were acquired and locked.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AcquiredExternalWorkerJobResponse'
        "400":
          description: Indicates the request was invalid.
          content: {}
        "403":
          description: Indicates the user does not have the rights acquire the jobs.
          content: {}
      x-codegen-request-body-name: body
  /acquire/jobs/{jobId}/bpmnError:
    post:
      tags:
      - Acquire and Execute
      summary: Complete an External Worker Job with a BPMN Error
      operationId: bpmnErrorJob
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/ExternalWorkerJobErrorRequest'
        required: false
      responses:
        "204":
          description: Indicates the job was successfully completed.
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Indicates the request was invalid.
          content: {}
        "403":
          description: Indicates the user does not have the rights complete the job.
          content: {}
        "404":
          description: Indicates the job does not exist.
          content: {}
      x-codegen-request-body-name: body
  /acquire/jobs/{jobId}/cmmnTerminate:
    post:
      tags:
      - Acquire and Execute
      summary: Complete an External Worker Job with a cmmn terminate transition
      operationId: terminateCmmnJob
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/ExternalWorkerJobTerminateRequest'
        required: false
      responses:
        "204":
          description: Indicates the job was successfully transitioned.
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Indicates the request was invalid.
          content: {}
        "403":
          description: Indicates the user does not have the rights complete the job.
          content: {}
        "404":
          description: Indicates the job does not exist.
          content: {}
      x-codegen-request-body-name: body
  /acquire/jobs/{jobId}/complete:
    post:
      tags:
      - Acquire and Execute
      summary: Complete an External Worker Jobs
      operationId: completeJob
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/ExternalWorkerJobCompleteRequest'
        required: false
      responses:
        "204":
          description: Indicates the job was successfully completed.
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Indicates the request was invalid.
          content: {}
        "403":
          description: Indicates the user does not have the rights complete the job.
          content: {}
        "404":
          description: Indicates the job does not exist.
          content: {}
      x-codegen-request-body-name: body
  /acquire/jobs/{jobId}/fail:
    post:
      tags:
      - Acquire and Execute
      summary: Fail an External Worker Job
      operationId: failJob
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/ExternalWorkerJobFailureRequest'
        required: false
      responses:
        "204":
          description: Indicates the job was successfully completed.
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Indicates the request was invalid.
          content: {}
        "403":
          description: Indicates the user does not have the rights complete the job.
          content: {}
        "404":
          description: Indicates the job does not exist.
          content: {}
      x-codegen-request-body-name: body
  /jobs:
    get:
      tags:
      - Info and Query
      summary: List External Worker Jobs
      operationId: listExternalWorkerJobs
      parameters:
      - name: elementId
        in: query
        description: Only return jobs with the given elementId
        schema:
          type: string
      - name: elementName
        in: query
        description: Only return jobs with the given elementName
        schema:
          type: string
      - name: exceptionMessage
        in: query
        description: Only return jobs with the given exception message
        schema:
          type: string
      - name: executionId
        in: query
        description: Only return jobs with the given executionId
        schema:
          type: string
      - name: id
        in: query
        description: Only return job with the given id
        schema:
          type: string
      - name: locked
        in: query
        description: Only return jobs that are locked
        schema:
          type: boolean
      - name: order
        in: query
        description: "From the paginate request.  The sort order, either 'asc' or\
          \ 'desc'. Defaults to 'asc'."
        schema:
          type: string
      - name: processDefinitionId
        in: query
        description: Only return jobs with the given processDefinitionId
        schema:
          type: string
      - name: processInstanceId
        in: query
        description: Only return jobs with the processInstanceId
        schema:
          type: string
      - name: scopeDefinitionId
        in: query
        description: Only return jobs with the given scopeDefinitionId
        schema:
          type: string
      - name: scopeId
        in: query
        description: Only return jobs with the given scopeId
        schema:
          type: string
      - name: size
        in: query
        description: "From the paginate request. Number of rows to fetch, starting\
          \ from start. Defaults to 10."
        schema:
          type: integer
          format: int32
      - name: start
        in: query
        description: From the paginate request. Index of the first row to fetch. Defaults
          to 0.
        schema:
          type: integer
          format: int32
      - name: subScopeId
        in: query
        description: Only return jobs with the given subScopeId
        schema:
          type: string
      - name: tenantId
        in: query
        description: Only return jobs with the given tenant id
        schema:
          type: string
      - name: tenantIdLike
        in: query
        description: Only return jobs with a tenantId like the given value
        schema:
          type: string
      - name: unlocked
        in: query
        description: Only return jobs that are unlocked
        schema:
          type: boolean
      - name: withException
        in: query
        description: Only return jobs with an exception
        schema:
          type: boolean
      - name: withoutProcessInstanceId
        in: query
        description: Only return jobs without a process instance id
        schema:
          type: boolean
      - name: withoutScopeId
        in: query
        description: Only return jobs without a scope id
        schema:
          type: boolean
      - name: withoutScopeType
        in: query
        description: Only return jobs without a scope type
        schema:
          type: boolean
      - name: withoutTenantId
        in: query
        description: Only return jobs without a tenantId
        schema:
          type: boolean
      responses:
        "200":
          description: Indicates the requested jobs were returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponseExternalWorkerJobResponse'
        "400":
          description: Indicates an illegal value has been used in a url query parameter.
            Status description contains additional details about the error.
          content: {}
        "403":
          description: Indicates the user does not have the rights to query for external
            worker jobs.
          content: {}
  /jobs/{jobId}:
    get:
      tags:
      - Info and Query
      summary: Get a single external worker job
      operationId: getExternalWorkerJob
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Indicates the requested job was returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalWorkerJobResponse'
        "403":
          description: Indicates the user does not have the rights access the job.
          content: {}
        "404":
          description: Indicates the requested job was not found.
          content: {}
  /unacquire/jobs:
    post:
      tags:
      - Unacquire
      summary: Unacquire External Worker Jobs
      operationId: unacquireJobs
      requestBody:
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/UnacquireExternalWorkerJobsRequest'
        required: false
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
        "204":
          description: Indicates the jobs were unacquired.
          content: {}
        "400":
          description: Indicates the request was invalid.
          content: {}
        "403":
          description: Indicates the user does not have the rights to unacquire the
            jobs.
          content: {}
      x-codegen-request-body-name: body
  /unacquire/jobs/{jobId}:
    post:
      tags:
      - Unacquire
      summary: Unaquire an External Worker Job
      operationId: unaquireJob
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/UnacquireExternalWorkerJobsRequest'
        required: false
      responses:
        "204":
          description: Indicates the job was successfully unaquired.
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Indicates the request was invalid.
          content: {}
        "403":
          description: Indicates the user does not have the rights to unacquire the
            job.
          content: {}
        "404":
          description: Indicates the job does not exist.
          content: {}
      x-codegen-request-body-name: body
components:
  schemas:
    AcquireExternalWorkerJobRequest:
      required:
      - lockDuration
      - topic
      - workerId
      type: object
      properties:
        topic:
          type: string
          description: Acquire jobs with the given topic
          example: order
        lockDuration:
          type: string
          description: The acquired jobs will be locked with this lock duration. ISO-8601
            duration format PnDTnHnMn.nS with days considered to be exactly 24 hours.
          example: PT10M
        numberOfTasks:
          type: integer
          description: The number of tasks that should be acquired. Default is 1.
          format: int32
          example: 1
        numberOfRetries:
          type: integer
          description: The number of retries if an optimistic lock exception occurs
            during acquiring. Default is 5
          format: int32
          example: 10
        workerId:
          type: string
          description: The id of the external worker that would be used for locking
            the job
          example: orderWorker1
        scopeType:
          type: string
          description: Only acquire jobs with the given scope type
          example: cmmn
      description: Request that is used for acquiring external worker jobs
    AcquiredExternalWorkerJobResponse:
      required:
      - id
      - url
      type: object
      properties:
        id:
          type: string
          description: The id of the external job
          example: "8"
        url:
          type: string
          description: The url of the external job
          example: http://localhost:8182/external-job-api/jobs/8
        correlationId:
          type: string
          description: The correlation id of the external job
          example: "50"
        processInstanceId:
          type: string
          description: The process instance id for the external job
          example: "5"
        processDefinitionId:
          type: string
          description: The process definition id for the external job
          example: customerProcess:1:4
        executionId:
          type: string
          description: The execution id for the external job
          example: "7"
        scopeId:
          type: string
          description: The scope id for the external job
          example: "20"
        subScopeId:
          type: string
          description: The sub scope id for the external job
          example: "21"
        scopeDefinitionId:
          type: string
          description: The scope definition id for the external job
          example: customerCase:1:39
        scopeType:
          type: string
          description: The scope type for the external job
          example: cmmn
        elementId:
          type: string
          description: The id of the element in the model
          example: customer
        elementName:
          type: string
          description: The name of the element in the model
          example: Process Customer Task
        retries:
          type: integer
          description: The remaining number of retries
          format: int32
          example: 3
        exceptionMessage:
          type: string
          description: The exception message for the job
          example: "null"
        dueDate:
          type: string
          description: The due date for the job
          format: date-time
          example: 2021-05-04T16:35:10.474Z
        createTime:
          type: string
          description: The creation time of the job
          format: date-time
          example: 2020-05-04T16:35:10.474Z
        tenantId:
          type: string
          description: The tenant if of the job
          example: flowable
        lockOwner:
          type: string
          description: The id of the lock owner. If not set then the job is not locked
          example: worker1
        lockExpirationTime:
          type: string
          description: The time when the lock expires
          format: date-time
          example: 2020-05-04T16:35:10.474Z
        variables:
          type: array
          description: The variables from the scope of the job
          items:
            $ref: '#/components/schemas/EngineRestVariable'
    DataResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties: {}
        total:
          type: integer
          format: int64
        start:
          type: integer
          format: int32
        sort:
          type: string
        order:
          type: string
        size:
          type: integer
          format: int32
    DataResponseExternalWorkerJobResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ExternalWorkerJobResponse'
        total:
          type: integer
          format: int64
        start:
          type: integer
          format: int32
        sort:
          type: string
        order:
          type: string
        size:
          type: integer
          format: int32
    EngineRestVariable:
      type: object
      properties:
        name:
          type: string
          description: Name of the variable
          example: myVariable
        type:
          type: string
          description: Type of the variable.
          example: string
        value:
          type: object
          properties: {}
          description: Value of the variable.
          example: test
        valueUrl:
          type: string
          example: http://....
    ExternalWorkerJobCollectionResource:
      type: object
    ExternalWorkerJobCompleteRequest:
      required:
      - workerId
      type: object
      properties:
        workerId:
          type: string
          description: The id of the external worker that executes the action. Must
            match the id of the worker who has most recently locked the job.
        variables:
          type: array
          description: The variables that should be passed to the job scope
          items:
            $ref: '#/components/schemas/EngineRestVariable'
      description: Request that is used for completing external worker jobs
    ExternalWorkerJobErrorRequest:
      required:
      - workerId
      type: object
      properties:
        workerId:
          type: string
          description: The id of the external worker that executes the action. Must
            match the id of the worker who has most recently locked the job.
        variables:
          type: array
          description: The variables that should be passed to the job scope
          items:
            $ref: '#/components/schemas/EngineRestVariable'
        errorCode:
          type: string
          description: The BPMN error code
      description: Request that is used for completing external worker jobs with a
        bpmn error
    ExternalWorkerJobFailureRequest:
      required:
      - workerId
      type: object
      properties:
        workerId:
          type: string
          description: The id of the external worker that reports the failure. Must
            match the id of the worker who has most recently locked the job.
        errorMessage:
          type: string
          description: Error message for the failure
          example: Database not available
        errorDetails:
          type: string
          description: Details for the failure
        retries:
          type: integer
          description: The new number of retries. If not set it will be reduced by
            1. If 0 the job will be moved ot the dead letter table and would no longer
            be available for acquiring.
          format: int32
        retryTimeout:
          type: string
          description: The timeout after which the job should be made available again.
            ISO-8601 duration format PnDTnHnMn.nS with days considered to be exactly
            24 hours.
          example: PT20M
      description: Request that is used for failing external worker jobs
    ExternalWorkerJobResponse:
      required:
      - id
      - url
      type: object
      properties:
        id:
          type: string
          description: The id of the external job
          example: "8"
        url:
          type: string
          description: The url of the external job
          example: http://localhost:8182/external-job-api/jobs/8
        correlationId:
          type: string
          description: The correlation id of the external job
          example: "50"
        processInstanceId:
          type: string
          description: The process instance id for the external job
          example: "5"
        processDefinitionId:
          type: string
          description: The process definition id for the external job
          example: customerProcess:1:4
        executionId:
          type: string
          description: The execution id for the external job
          example: "7"
        scopeId:
          type: string
          description: The scope id for the external job
          example: "20"
        subScopeId:
          type: string
          description: The sub scope id for the external job
          example: "21"
        scopeDefinitionId:
          type: string
          description: The scope definition id for the external job
          example: customerCase:1:39
        scopeType:
          type: string
          description: The scope type for the external job
          example: cmmn
        elementId:
          type: string
          description: The id of the element in the model
          example: customer
        elementName:
          type: string
          description: The name of the element in the model
          example: Process Customer Task
        retries:
          type: integer
          description: The remaining number of retries
          format: int32
          example: 3
        exceptionMessage:
          type: string
          description: The exception message for the job
          example: "null"
        dueDate:
          type: string
          description: The due date for the job
          format: date-time
          example: 2021-05-04T16:35:10.474Z
        createTime:
          type: string
          description: The creation time of the job
          format: date-time
          example: 2020-05-04T16:35:10.474Z
        tenantId:
          type: string
          description: The tenant if of the job
          example: flowable
        lockOwner:
          type: string
          description: The id of the lock owner. If not set then the job is not locked
          example: worker1
        lockExpirationTime:
          type: string
          description: The time when the lock expires
          format: date-time
          example: 2020-05-04T16:35:10.474Z
    ExternalWorkerJobTerminateRequest:
      required:
      - workerId
      type: object
      properties:
        workerId:
          type: string
          description: The id of the external worker that executes the action. Must
            match the id of the worker who has most recently locked the job.
        variables:
          type: array
          description: The variables that should be passed to the job scope
          items:
            $ref: '#/components/schemas/EngineRestVariable'
      description: Request that is used for terminating external worker jobs
    UnacquireExternalWorkerJobsRequest:
      required:
      - workerId
      type: object
      properties:
        workerId:
          type: string
          description: The worker id for the external worker jobs to unaquire
          example: orderWorker1
        tenantId:
          type: string
          description: The tenant id for the external worker jobs to unaquire
          example: tenant1
      description: Request that is used for unacquiring external worker jobs
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
x-original-swagger-version: "2.0"
