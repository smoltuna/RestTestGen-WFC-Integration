openapi: 3.0.1
info:
  title: Flowable Event Registry REST API
  description: "# flowable / flowəb(ə)l /\r\n\r\n- a compact and highly efficient\
    \ workflow and Business Process Management (BPM) platform for developers, system\
    \ admins and business users.\r\n- a lightning fast, tried and tested BPMN 2 process\
    \ engine written in Java. It is Apache 2.0 licensed open source, with a committed\
    \ community.\r\n- can run embedded in a Java application, or as a service on a\
    \ server, a cluster, and in the cloud. It integrates perfectly with Spring. With\
    \ a rich Java and REST API, it is the ideal engine for orchestrating human or\
    \ system activities."
  contact:
    name: Flowable
    url: http://www.flowable.org/
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: v1
servers:
- url: /flowable-rest/event-registry-api
tags:
- name: Channel Definitions
- name: Deployment
- name: Event Definitions
- name: Event Deployment
- name: Event Instances
- name: Event Registry Deployment
- name: Event Registry Engine
paths:
  /event-registry-management/engine:
    get:
      tags:
      - Event Registry Engine
      summary: Get engine info
      operationId: getEngineInfo
      responses:
        "200":
          description: Indicates the engine info is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineInfoResponse'
      security:
      - basicAuth: []
  /event-registry-repository/channel-definitions:
    get:
      tags:
      - Channel Definitions
      summary: List of channel definitions
      operationId: listChannelDefinitions
      parameters:
      - name: version
        in: query
        description: Only return channel definitions with the given version.
        schema:
          type: integer
      - name: name
        in: query
        description: Only return channel definitions with the given name.
        schema:
          type: string
      - name: nameLike
        in: query
        description: Only return channel definitions with a name like the given name.
        schema:
          type: string
      - name: nameLikeIgnoreCase
        in: query
        description: Only return channel definitions with a name like the given name
          (case-insensitive).
        schema:
          type: string
      - name: key
        in: query
        description: Only return channel definitions with the given key.
        schema:
          type: string
      - name: keyLike
        in: query
        description: Only return channel definitions with a name like the given key.
        schema:
          type: string
      - name: keyLikeIgnoreCase
        in: query
        description: Only return channel definitions with a name like the given key
          (case-insensitive).
        schema:
          type: string
      - name: createTime
        in: query
        description: Only return channel definitions with the given create time.
        schema:
          type: string
          format: date-time
      - name: createTimeAfter
        in: query
        description: Only return channel definitions with a create time after the
          given date.
        schema:
          type: string
          format: date-time
      - name: createTimeBefore
        in: query
        description: Only return channel definitions with a create time before the
          given date.
        schema:
          type: string
          format: date-time
      - name: resourceName
        in: query
        description: Only return channel definitions with the given resource name.
        schema:
          type: string
      - name: resourceNameLike
        in: query
        description: Only return channel definitions with a name like the given resource
          name.
        schema:
          type: string
      - name: category
        in: query
        description: Only return channel definitions with the given category.
        schema:
          type: string
      - name: categoryLike
        in: query
        description: Only return channel definitions with a category like the given
          name.
        schema:
          type: string
      - name: categoryNotEquals
        in: query
        description: Only return channel definitions which do not have the given category.
        schema:
          type: string
      - name: deploymentId
        in: query
        description: Only return channel definitions which are part of a deployment
          with the given deployment id.
        schema:
          type: string
      - name: parentDeploymentId
        in: query
        description: Only return channel definitions which are part of a deployment
          awith the given parent deployment id.
        schema:
          type: string
      - name: latest
        in: query
        description: "Only return the latest channel definition versions. Can only\
          \ be used together with key and keyLike parameters, using any other parameter\
          \ will result in a 400-response."
        schema:
          type: boolean
      - name: onlyInbound
        in: query
        description: Only return the inbound channel definitions. Mutually exclusive
          with onlyOutbound
        schema:
          type: boolean
      - name: onlyOutbound
        in: query
        description: Only return the outbound channel definitions. Mutually exclusive
          with onlyInbound
        schema:
          type: boolean
      - name: implementation
        in: query
        description: Only return the channel definitions with the given implementation
          type.
        schema:
          type: string
      - name: sort
        in: query
        description: "Property to sort on, to be used together with the order."
        schema:
          type: string
          enum:
          - name
          - id
          - key
          - category
          - deploymentId
          - version
      - name: order
        in: query
        description: "The sort order, either 'asc' or 'desc'. Defaults to 'asc'."
        schema:
          type: string
      - name: start
        in: query
        description: Index of the first row to fetch. Defaults to 0.
        schema:
          type: integer
      - name: size
        in: query
        description: "Number of rows to fetch, starting from start. Defaults to 10."
        schema:
          type: integer
      responses:
        "200":
          description: Indicates request was successful and the channel definitions
            are returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponseChannelDefinitionResponse'
        "400":
          description: Indicates a parameter was passed in the wrong format or that
            latest is used with other parameters other than key and keyLike. The status-message
            contains additional information.
          content: {}
      security:
      - basicAuth: []
  /event-registry-repository/channel-definitions/{channelDefinitionId}:
    get:
      tags:
      - Channel Definitions
      summary: Get a channel definition
      operationId: getChannelDefinition
      parameters:
      - name: channelDefinitionId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Indicates request was successful and the channel definitions
            are returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelDefinitionResponse'
        "404":
          description: Indicates the requested channel definition was not found.
          content: {}
      security:
      - basicAuth: []
  /event-registry-repository/channel-definitions/{channelDefinitionId}/model:
    get:
      tags:
      - Channel Definitions
      summary: Get a channel definition JSON model
      operationId: getChannelModelResource
      parameters:
      - name: channelDefinitionId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Indicates the event definition was found and the model is returned.
            The response contains the full event definition model.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelModel'
        "404":
          description: Indicates the requested event definition was not found.
          content: {}
      security:
      - basicAuth: []
  /event-registry-repository/channel-definitions/{channelDefinitionId}/resourcedata:
    get:
      tags:
      - Channel Definitions
      summary: Get a channel definition resource content
      operationId: getChannelDefinitionResource
      parameters:
      - name: channelDefinitionId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Indicates both channel definition and resource have been found
            and the resource data has been returned.
          content:
            '*/*':
              schema:
                type: array
                items:
                  pattern: "^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$"
                  type: string
                  format: byte
        "404":
          description: Indicates the requested channel definition was not found or
            there is no resource with the given id present in the channel definition.
            The status-description contains additional information.
          content: {}
      security:
      - basicAuth: []
  /event-registry-repository/deployments:
    get:
      tags:
      - Deployment
      summary: List Deployments
      operationId: listDeployments
      parameters:
      - name: name
        in: query
        description: Only return deployments with the given name.
        schema:
          type: string
      - name: nameLike
        in: query
        description: Only return deployments with a name like the given name.
        schema:
          type: string
      - name: category
        in: query
        description: Only return deployments with the given category.
        schema:
          type: string
      - name: categoryNotEquals
        in: query
        description: Only return deployments which do not have the given category.
        schema:
          type: string
      - name: parentDeploymentId
        in: query
        description: Only return deployments with the given parent deployment id.
        schema:
          type: string
      - name: parentDeploymentIdLike
        in: query
        description: Only return deployments with a parent deployment id like the
          given value.
        schema:
          type: string
      - name: tenantIdLike
        in: query
        description: Only return deployments with a tenantId like the given value.
        schema:
          type: string
      - name: tenantId
        in: query
        description: Only return deployments with the given tenantId.
        schema:
          type: string
      - name: withoutTenantId
        in: query
        description: "If true, only returns deployments without a tenantId set. If\
          \ false, the withoutTenantId parameter is ignored."
        schema:
          type: boolean
      - name: sort
        in: query
        description: "Property to sort on, to be used together with the order."
        schema:
          type: string
          enum:
          - id
          - name
          - deployTime
          - tenantId
      - name: order
        in: query
        description: "The sort order, either 'asc' or 'desc'. Defaults to 'asc'."
        schema:
          type: string
      - name: start
        in: query
        description: Index of the first row to fetch. Defaults to 0.
        schema:
          type: integer
      - name: size
        in: query
        description: "Number of rows to fetch, starting from start. Defaults to 10."
        schema:
          type: integer
      responses:
        "200":
          description: Indicates the request was successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponseEventDeploymentResponse'
      security:
      - basicAuth: []
    post:
      tags:
      - Deployment
      summary: Create a new deployment
      description: |-
        The request body should contain data of type multipart/form-data. There should be exactly one file in the request, any additional files will be ignored. The deployment name is the name of the file-field passed in. If multiple resources need to be deployed in a single deployment, compress the resources in a zip and make sure the file-name ends with .bar or .zip.

        An additional parameter (form-field) can be passed in the request body with name tenantId. The value of this field will be used as the id of the tenant this deployment is done in.
      operationId: uploadDeployment
      parameters:
      - name: category
        in: query
        schema:
          type: string
      - name: deploymentName
        in: query
        schema:
          type: string
      - name: tenantId
        in: query
        schema:
          type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              required:
              - file
              type: object
              properties:
                file:
                  type: string
                  format: binary
        required: true
      responses:
        "201":
          description: Indicates the deployment was created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDeploymentResponse'
        "400":
          description: Indicates there was no content present in the request body
            or the content mime-type is not supported for deployment. The status-description
            contains additional information.
          content: {}
      security:
      - basicAuth: []
  /event-registry-repository/deployments/{deploymentId}:
    get:
      tags:
      - Deployment
      summary: Get a deployment
      operationId: getDeployment
      parameters:
      - name: deploymentId
        in: path
        description: The id of the deployment to get.
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Indicates the deployment was found and returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDeploymentResponse'
        "404":
          description: Indicates the requested deployment was not found.
          content: {}
      security:
      - basicAuth: []
    delete:
      tags:
      - Deployment
      summary: Delete a deployment
      operationId: deleteDeployment
      parameters:
      - name: deploymentId
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Indicates the deployment was found and has been deleted. Response-body
            is intentionally empty.
          content: {}
        "404":
          description: Indicates the requested deployment was not found.
          content: {}
      security:
      - basicAuth: []
  /event-registry-repository/deployments/{deploymentId}/resourcedata/{resourceName}:
    get:
      tags:
      - Deployment
      summary: Get a deployment resource content
      description: "The response body will contain the binary resource-content for\
        \ the requested resource. The response content-type will be the same as the\
        \ type returned in the resources mimeType property. Also, a content-disposition\
        \ header is set, allowing browsers to download the file instead of displaying\
        \ it."
      operationId: getDeploymentResourceData
      parameters:
      - name: deploymentId
        in: path
        required: true
        schema:
          type: string
      - name: resourceName
        in: path
        description: The name of the resource to get.
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Indicates both deployment and resource have been found and
            the resource data has been returned.
          content:
            '*/*':
              schema:
                type: array
                items:
                  pattern: "^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$"
                  type: string
                  format: byte
        "404":
          description: Indicates the requested deployment was not found or there is
            no resource with the given id present in the deployment. The status-description
            contains additional information.
          content: {}
      security:
      - basicAuth: []
  /event-registry-repository/deployments/{deploymentId}/resources:
    get:
      tags:
      - Deployment
      summary: List resources in a deployment
      description: The dataUrl property in the resulting JSON for a single resource
        contains the actual URL to use for retrieving the binary resource.
      operationId: listDeploymentResources
      parameters:
      - name: deploymentId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Indicates the deployment was found and the resource list has
            been returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeploymentResourceResponse'
        "404":
          description: Indicates the requested deployment was not found.
          content: {}
      security:
      - basicAuth: []
  /event-registry-repository/deployments/{deploymentId}/resources/**:
    get:
      tags:
      - Deployment
      summary: Get a deployment resource
      description: Replace ** by ResourceId
      operationId: getDeploymentResource
      parameters:
      - name: deploymentId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Indicates both deployment and resource have been found and
            the resource has been returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentResourceResponse'
        "404":
          description: Indicates the requested deployment was not found or there is
            no resource with the given id present in the deployment. The status-description
            contains additional information.
          content: {}
      security:
      - basicAuth: []
  /event-registry-repository/event-definitions:
    get:
      tags:
      - Event Definitions
      summary: List of event definitions
      operationId: listEventDefinitions
      parameters:
      - name: version
        in: query
        description: Only return event definitions with the given version.
        schema:
          type: integer
      - name: name
        in: query
        description: Only return event definitions with the given name.
        schema:
          type: string
      - name: nameLike
        in: query
        description: Only return event definitions with a name like the given name.
        schema:
          type: string
      - name: nameLikeIgnoreCase
        in: query
        description: Only return event definitions with a name like the given name
          (case-insensitive).
        schema:
          type: string
      - name: key
        in: query
        description: Only return event definitions with the given key.
        schema:
          type: string
      - name: keyLike
        in: query
        description: Only return event definitions with a name like the given key.
        schema:
          type: string
      - name: keyLikeIgnoreCase
        in: query
        description: Only return event definitions with a name like the given key
          (case-insensitive).
        schema:
          type: string
      - name: resourceName
        in: query
        description: Only return event definitions with the given resource name.
        schema:
          type: string
      - name: resourceNameLike
        in: query
        description: Only return event definitions with a name like the given resource
          name.
        schema:
          type: string
      - name: category
        in: query
        description: Only return event definitions with the given category.
        schema:
          type: string
      - name: categoryLike
        in: query
        description: Only return event definitions with a category like the given
          name.
        schema:
          type: string
      - name: categoryNotEquals
        in: query
        description: Only return event definitions which do not have the given category.
        schema:
          type: string
      - name: deploymentId
        in: query
        description: Only return event definitions which are part of a deployment
          with the given deployment id.
        schema:
          type: string
      - name: parentDeploymentId
        in: query
        description: Only return event definitions which are part of a deployment
          with the given parent deployment id.
        schema:
          type: string
      - name: latest
        in: query
        description: "Only return the latest event definition versions. Can only be\
          \ used together with key and keyLike parameters, using any other parameter\
          \ will result in a 400-response."
        schema:
          type: boolean
      - name: sort
        in: query
        description: "Property to sort on, to be used together with the order."
        schema:
          type: string
          enum:
          - name
          - id
          - key
          - category
          - deploymentId
          - version
      - name: order
        in: query
        description: "The sort order, either 'asc' or 'desc'. Defaults to 'asc'."
        schema:
          type: string
      - name: start
        in: query
        description: Index of the first row to fetch. Defaults to 0.
        schema:
          type: integer
      - name: size
        in: query
        description: "Number of rows to fetch, starting from start. Defaults to 10."
        schema:
          type: integer
      responses:
        "200":
          description: Indicates request was successful and the event definitions
            are returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponseEventDefinitionResponse'
        "400":
          description: Indicates a parameter was passed in the wrong format or that
            latest is used with other parameters other than key and keyLike. The status-message
            contains additional information.
          content: {}
      security:
      - basicAuth: []
  /event-registry-repository/event-definitions/{eventDefinitionId}:
    get:
      tags:
      - Event Definitions
      summary: Get an event definition
      operationId: getEventDefinition
      parameters:
      - name: eventDefinitionId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Indicates request was successful and the event definitions
            are returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDefinitionResponse'
        "404":
          description: Indicates the requested event definition was not found.
          content: {}
      security:
      - basicAuth: []
  /event-registry-repository/event-definitions/{eventDefinitionId}/model:
    get:
      tags:
      - Event Definitions
      summary: Get an event definition JSON model
      operationId: getEventModelResource
      parameters:
      - name: eventDefinitionId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Indicates the event definition was found and the model is returned.
            The response contains the full event definition model.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventModel'
        "404":
          description: Indicates the requested event definition was not found.
          content: {}
      security:
      - basicAuth: []
  /event-registry-repository/event-definitions/{eventDefinitionId}/resourcedata:
    get:
      tags:
      - Event Definitions
      summary: Get an event definition resource content
      operationId: getEventDefinitionResource
      parameters:
      - name: eventDefinitionId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Indicates both event definition and resource have been found
            and the resource data has been returned.
          content:
            '*/*':
              schema:
                type: array
                items:
                  pattern: "^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$"
                  type: string
                  format: byte
        "404":
          description: Indicates the requested event definition was not found or there
            is no resource with the given id present in the event definition. The
            status-description contains additional information.
          content: {}
      security:
      - basicAuth: []
  /event-registry-runtime/event-instances:
    post:
      tags:
      - Event Instances
      summary: Send an event instance
      description: "Only one of *eventDefinitionId* or *eventDefinitionKey* an be\
        \ used in the request body. \n\n"
      operationId: createEventInstance
      requestBody:
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/EventInstanceCreateRequest'
        required: false
      responses:
        "204":
          description: Indicates the event instance was created.
          content: {}
        "400":
          description: "Indicates either the event definition was not found (based\
            \ on id or key), no event was send. Status description contains additional\
            \ information about the error."
          content: {}
      security:
      - basicAuth: []
      x-codegen-request-body-name: body
components:
  schemas:
    ChannelDefinitionResponse:
      type: object
      properties:
        id:
          type: string
          example: oneChannel:1:4
        url:
          type: string
          example: http://localhost:8182/event-registry-repository/channel-definitions/oneChannel%3A1%3A4
        key:
          type: string
          example: oneChannel
        version:
          type: integer
          format: int32
          example: 1
        name:
          type: string
          example: The One Channel
        type:
          type: string
          example: inbound
          enum:
          - inbound
          - outbound
        implementation:
          type: string
          example: kafka
        createTime:
          type: string
          format: date-time
          example: 2010-10-13T14:54:26.75+02:00
        description:
          type: string
          example: This is a channel definition for testing purposes
        tenantId:
          type: string
          example: "null"
        deploymentId:
          type: string
          example: "2"
        deploymentUrl:
          type: string
          example: http://localhost:8182/event-registry-repository/deployments/2
        resourceName:
          type: string
          example: oneChannel.channel
        resource:
          type: string
          description: Contains the actual deployed channel definition JSON.
          example: http://localhost:8182/event-registry-repository/deployments/2/resources/oneChannel.channel
        category:
          type: string
          example: Examples
    ChannelModel:
      type: object
      properties:
        key:
          type: string
        category:
          type: string
        name:
          type: string
        description:
          type: string
        channelType:
          type: string
        type:
          type: string
        extension:
          $ref: '#/components/schemas/JsonNode'
    DataResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties: {}
        total:
          type: integer
          format: int64
        start:
          type: integer
          format: int32
        sort:
          type: string
        order:
          type: string
        size:
          type: integer
          format: int32
    DataResponseChannelDefinitionResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ChannelDefinitionResponse'
        total:
          type: integer
          format: int64
        start:
          type: integer
          format: int32
        sort:
          type: string
        order:
          type: string
        size:
          type: integer
          format: int32
    DataResponseEventDefinitionResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/EventDefinitionResponse'
        total:
          type: integer
          format: int64
        start:
          type: integer
          format: int32
        sort:
          type: string
        order:
          type: string
        size:
          type: integer
          format: int32
    DataResponseEventDeploymentResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/EventDeploymentResponse'
        total:
          type: integer
          format: int64
        start:
          type: integer
          format: int32
        sort:
          type: string
        order:
          type: string
        size:
          type: integer
          format: int32
    DeploymentResourceResponse:
      type: object
      properties:
        id:
          type: string
          example: diagrams/my-process.bpmn20.xml
        url:
          type: string
          description: For a single resource contains the actual URL to use for retrieving
            the binary resource
