server.port=8080
server.servlet.context-path=/flowable-rest

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:flowable
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Flowable engine configuration
flowable.database-schema-update=true
flowable.async-executor-activate=true
flowable.history-level=full
flowable.process.servlet.path=/service

# Admin user configuration (used by auth.py for mitmproxy)
# Note: Default Flowable credentials are rest-admin/test
# CUSTOM
flowable.rest.app.admin.user-id=restapitestteam@gmail.com
flowable.rest.app.admin.password=restapitestteam
flowable.rest.app.admin.first-name=REST API Test
flowable.rest.app.admin.last-name=Team


flowable.rest.app.authentication-mode=any-user

# Enable demo process definitions for testing
flowable.rest.app.create-demo-definitions=true

# Enable Swagger documentation at /flowable-rest/docs
flowable.rest.app.swagger-docs-enabled=true

# Enable Swagger documentation at /flowable-rest/docs
flowable.rest.app.swagger-docs-enabled=true

# Logging configuration
logging.level.org.flowable=INFO
logging.level.org.springframework.web=INFO
logging.level.root=WARN

# JPA / Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none

# H2 Console (disabled for security)
spring.h2.console.enabled=false

# Actuator endpoints for health monitoring
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
