# Flowable REST API Configuration for RESTgym
# H2 in-memory database configuration

# Server
server.port=8080
server.servlet.context-path=/flowable-rest

# Datasource - H2 in-memory
spring.datasource.url=jdbc:h2:mem:flowable;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Flowable configuration
flowable.database-schema-update=true
flowable.async-executor-activate=true
flowable.rest.app.admin.user-id=admin
flowable.rest.app.admin.password=test
flowable.rest.app.admin.first-name=Admin
flowable.rest.app.admin.last-name=User

# Disable security for testing (RESTgym environment)
flowable.rest.app.authentication-mode=verify-privilege

# Logging
logging.level.org.flowable=INFO
logging.level.org.springframework.web=INFO
logging.level.root=WARN

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none

# H2 Console (disabled in production)
spring.h2.console.enabled=false

# Actuator endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
