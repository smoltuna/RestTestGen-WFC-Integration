openapi: 3.0.1
info:
  title: realworld-backend-micronaut
  description: Real world backend API built in Micronaut
  contact:
    name: Alexey Lapin
    url: https://github.com/alexey-lapin
    email: alexey-lapin@protonmail.com
  license:
    name: MIT
    url: https://github.com/alexey-lapin/realworld-backend-micronaut/blob/master/LICENSE
  version: 0.1.0-master-SNAPSHOT
servers:
- url: http://localhost:9090
  description: Test server
externalDocs:
  description: GitHub alexey-lapin/realworld-backend-micronaut
  url: https://github.com/alexey-lapin/realworld-backend-micronaut
security:
- token: []
- bearer: []
paths:
  /api/articles:
    get:
      tags:
      - Articles
      operationId: findByFilters
      parameters:
      - name: tag
        in: query
        explode: false
        schema:
          type: string
          nullable: true
      - name: author
        in: query
        explode: false
        schema:
          type: string
          nullable: true
      - name: favourited
        in: query
        explode: false
        schema:
          type: string
          nullable: true
      - name: limit
        in: query
        required: true
        explode: false
        schema:
          type: integer
          format: int32
          default: 20
      - name: offset
        in: query
        required: true
        explode: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: favorited
        in: query
        schema:
          type: string
      responses:
        "200":
          description: findByFilters 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetArticlesResult"
    post:
      tags:
      - Articles
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArticle"
        required: true
      responses:
        "201":
          description: create 201 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateArticleResult"
  /api/articles/feed:
    get:
      tags:
      - Articles
      operationId: feed
      parameters:
      - name: limit
        in: query
        required: true
        explode: false
        schema:
          type: integer
          format: int32
          default: 20
      - name: offset
        in: query
        required: true
        explode: false
        schema:
          type: integer
          format: int32
          default: 0
      responses:
        "200":
          description: feed 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFeedResult"
  /api/articles/{slug}:
    get:
      tags:
      - Articles
      operationId: findBySlug
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: findBySlug 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetArticleResult"
    put:
      tags:
      - Articles
      operationId: updateBySlug
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateArticle"
        required: true
      responses:
        "200":
          description: updateBySlug 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateArticleResult"
    delete:
      tags:
      - Articles
      operationId: deleteBySlug
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: deleteBySlug 204 response
  /api/articles/{slug}/comments:
    get:
      tags:
      - Articles
      operationId: findAllComments
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: findAllComments 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCommentsResult"
    post:
      tags:
      - Articles
      operationId: addComment
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddComment"
        required: true
      responses:
        "200":
          description: addComment 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddCommentResult"
  /api/articles/{slug}/comments/{id}:
    get:
      tags:
      - Articles
      operationId: findComment
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: findComment 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCommentResult"
    delete:
      tags:
      - Articles
      operationId: deleteComment
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "204":
          description: deleteComment 204 response
  /api/articles/{slug}/favorite:
    post:
      tags:
      - Articles
      operationId: favorite
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: favorite 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoriteArticleResult"
    delete:
      tags:
      - Articles
      operationId: unfavorite
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: unfavorite 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnfavoriteArticleResult"
  /api/profiles/{username}:
    get:
      tags:
      - Profiles
      operationId: findByUsername
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: findByUsername 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProfileResult"
  /api/profiles/{username}/follow:
    post:
      tags:
      - Profiles
      operationId: follow
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: follow 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowProfileResult"
    delete:
      tags:
      - Profiles
      operationId: unfollow
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: unfollow 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnfollowProfileResult"
  /api/tags:
    get:
      tags:
      - Tags
      operationId: findAll
      responses:
        "200":
          description: findAll 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTagsResult"
  /api/user:
    get:
      tags:
      - Users
      operationId: current
      responses:
        "200":
          description: current 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCurrentUserResult"
    put:
      tags:
      - Users
      operationId: update
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUser"
        required: true
      responses:
        "200":
          description: update 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUserResult"
  /api/users:
    post:
      tags:
      - Users
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterUser"
        required: true
      responses:
        "200":
          description: register 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterUserResult"
  /api/users/login:
    post:
      tags:
      - Users
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginUser"
        required: true
      responses:
        "200":
          description: login 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginUserResult"
  /beans:
    get:
      tags:
      - _Management
      operationId: getBeans
      responses:
        "200":
          description: getBeans 200 response
          content:
            application/json:
              schema:
                type: object
  /env:
    get:
      tags:
      - _Management
      operationId: getEnvironmentInfo
      responses:
        "200":
          description: getEnvironmentInfo 200 response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
  /env/{propertySourceName}:
    get:
      tags:
      - _Management
      operationId: getProperties
      parameters:
      - name: propertySourceName
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: getProperties 200 response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
  /health:
    get:
      tags:
      - _Management
      operationId: getHealth
      responses:
        "200":
          description: getHealth 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HealthResult"
  /health/{selector}:
    get:
      tags:
      - _Management
      operationId: getHealth_1
      parameters:
      - name: selector
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/HealthCheckType"
      responses:
        "200":
          description: getHealth_1 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HealthResult"
  /info:
    get:
      tags:
      - _Management
      operationId: getInfo
      responses:
        "200":
          description: getInfo 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /loggers:
    get:
      tags:
      - _Management
      operationId: loggers
      responses:
        "200":
          description: loggers 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties:
                    type: object
  /loggers/{name}:
    get:
      tags:
      - _Management
      operationId: logger
      parameters:
      - name: name
        in: path
        required: true
        schema:
          minLength: 1
          type: string
      responses:
        "200":
          description: logger 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties:
                    type: object
    post:
      tags:
      - _Management
      operationId: setLogLevel
      parameters:
      - name: name
        in: path
        required: true
        schema:
          minLength: 1
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                configuredLevel:
                  nullable: true
                  allOf:
                  - $ref: "#/components/schemas/LogLevel"
        required: true
      responses:
        "200":
          description: setLogLevel 200 response
  /refresh:
    post:
      tags:
      - _Management
      operationId: refresh
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  nullable: true
        required: true
      responses:
        "200":
          description: refresh 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /routes:
    get:
      tags:
      - _Management
      operationId: getRoutes
      responses:
        "200":
          description: getRoutes 200 response
          content:
            application/json:
              schema:
                type: object
  /stop:
    post:
      tags:
      - _Management
      operationId: stop
      responses:
        "200":
          description: stop 200 response
          content:
            application/json:
              schema:
                type: object
  /threaddump:
    get:
      tags:
      - _Management
      operationId: getThreadDump
      responses:
        "200":
          description: getThreadDump 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
components:
  schemas:
    AddComment:
      type: object
      properties:
        comment:
          $ref: "#/components/schemas/AddCommentDto"
    AddCommentDto:
      type: object
      properties:
        body:
          type: string
    AddCommentResult:
      type: object
      properties:
        comment:
          $ref: "#/components/schemas/CommentDto"
    ArticleDto:
      type: object
      properties:
        slug:
          type: string
        title:
          type: string
        description:
          type: string
        body:
          type: string
        tagList:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        favorited:
          type: boolean
        favoritesCount:
          type: integer
          format: int32
        author:
          $ref: "#/components/schemas/ProfileDto"
    CommentDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        body:
          type: string
        author:
          $ref: "#/components/schemas/ProfileDto"
    CreateArticle:
      type: object
      properties:
        article:
          $ref: "#/components/schemas/CreateArticleDto"
    CreateArticleDto:
      required:
      - body
      - description
      - title
      type: object
      properties:
        title:
          minLength: 1
          type: string
        description:
          minLength: 1
          type: string
        body:
          minLength: 1
          type: string
        tagList:
          type: array
          items:
            type: string
    CreateArticleResult:
      type: object
      properties:
        article:
          $ref: "#/components/schemas/ArticleDto"
    FavoriteArticleResult:
      type: object
      properties:
        article:
          $ref: "#/components/schemas/ArticleDto"
    FollowProfileResult:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/ProfileDto"
    GetArticleResult:
      required:
      - article
      type: object
      properties:
        article:
          $ref: "#/components/schemas/ArticleDto"
    GetArticlesResult:
      type: object
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/ArticleDto"
        articlesCount:
          type: integer
          format: int32
    GetCommentResult:
      type: object
      properties:
        comment:
          $ref: "#/components/schemas/CommentDto"
    GetCommentsResult:
      type: object
      properties:
        comments:
          type: array
          items:
            $ref: "#/components/schemas/CommentDto"
    GetCurrentUserResult:
      required:
      - user
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserDto"
    GetFeedResult:
      type: object
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/ArticleDto"
        articlesCount:
          type: integer
          format: int32
    GetProfileResult:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/ProfileDto"
    GetTagsResult:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
    HealthCheckType:
      type: string
      enum:
      - LIVENESS
      - READINESS
    HealthResult:
      type: object
      properties:
        name:
          type: string
        status:
          $ref: "#/components/schemas/HealthStatus"
        details:
          type: object
    HealthStatus:
      required:
      - description
      - name
      - operational
      - severity
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        operational:
          type: boolean
          nullable: true
        severity:
          type: integer
          format: int32
          nullable: true
    LogLevel:
      type: string
      enum:
      - ALL
      - TRACE
      - DEBUG
      - INFO
      - WARN
      - ERROR
      - "OFF"
      - NOT_SPECIFIED
    LoginUser:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/LoginUserDto"
    LoginUserDto:
      required:
      - password
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          minLength: 1
          type: string
    LoginUserResult:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserDto"
    ProfileDto:
      type: object
      properties:
        username:
          type: string
        bio:
          type: string
        image:
          type: string
        following:
          type: boolean
    RegisterUser:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/RegisterUserDto"
    RegisterUserDto:
      required:
      - password
      - username
      type: object
      properties:
        email:
          type: string
          format: email
        username:
          minLength: 1
          type: string
        password:
          minLength: 1
          type: string
    RegisterUserResult:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserDto"
    UnfavoriteArticleResult:
      type: object
      properties:
        article:
          $ref: "#/components/schemas/ArticleDto"
    UnfollowProfileResult:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/ProfileDto"
    UpdateArticle:
      type: object
      properties:
        article:
          $ref: "#/components/schemas/UpdateArticleDto"
    UpdateArticleDto:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        body:
          type: string
    UpdateArticleResult:
      type: object
      properties:
        article:
          $ref: "#/components/schemas/ArticleDto"
    UpdateUser:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UpdateUserDto"
    UpdateUserDto:
      type: object
      properties:
        email:
          type: string
          format: email
        username:
          type: string
        password:
          type: string
        image:
          type: string
        bio:
          type: string
    UpdateUserResult:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserDto"
    UserDto:
      type: object
      properties:
        email:
          type: string
        token:
          type: string
        username:
          type: string
        bio:
          type: string
        image:
          type: string
  securitySchemes:
    bearer:
      type: http
      description: |
        For accessing the protected API resources, you must have received a valid JWT token after registering or
        logging in. This JWT token must then be used for all protected resources by passing it in via the
        'Authorization' header.

        A JWT token is generated by the API by either registering via /users or logging in via /users/login.

        The following format must be in the 'Authorization' header:

        `Bearer xxxxxx.yyyyyyy.zzzzzz`

        The following format must be in **the _value_ field below**:

        `xxxxxx.yyyyyyy.zzzzzz`
      scheme: bearer
      bearerFormat: JWT
    token:
      type: apiKey
      description: |+
        For accessing the protected API resources, you must have received a valid JWT token after registering or
        logging in. This JWT token must then be used for all protected resources by passing it in via the
        'Authorization' header.

        A JWT token is generated by the API by either registering via **/users** or logging in via
        **/users/login**.

        The following format must be in the 'Authorization' header **and the _value_ field below**:

        `Token xxxxxx.yyyyyyy.zzzzzz`

      name: Authorization
      in: header
