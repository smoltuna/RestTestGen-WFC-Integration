# OAuth2 via OIDC token endpoint
auth:
  - name: admin
    loginEndpointAuth:
      payloadRaw: "grant_type=password&client_id=admin-cli&username=restapitestteam@gmail.com&password=universe"

authTemplate:
  loginEndpointAuth:
    endpoint: /realms/master/protocol/openid-connect/token
    verb: POST
    contentType: application/x-www-form-urlencoded
    token:
      extractFromField: /access_token
      httpHeaderName: Authorization
      headerPrefix: "Bearer "
