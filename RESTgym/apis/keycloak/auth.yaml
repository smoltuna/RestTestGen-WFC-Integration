# WFC Auth configuration for Keycloak
# Authentication: OAuth2 Bearer Token via OpenID Connect token endpoint

auth:
  - name: admin
    loginEndpointAuth:
      payloadRaw: "grant_type=password&client_id=admin-cli&username=admin&password=admin"

authTemplate:
  loginEndpointAuth:
    endpoint: /realms/master/protocol/openid-connect/token
    verb: POST
    contentType: application/x-www-form-urlencoded
    token:
      extractFrom: body
      extractSelector: /access_token
      sendIn: header
      sendName: Authorization
      sendTemplate: "Bearer {token}"
