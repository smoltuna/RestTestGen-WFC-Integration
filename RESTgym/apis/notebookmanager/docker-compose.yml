services:
  mysql:
    image: mysql:8.0
    container_name: notebookmanager-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: notebook_manager
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notebookmanager-network

  api:
    build:
      context: ../..
      dockerfile: apis/notebookmanager/Dockerfile
    container_name: notebookmanager-restgym
    environment:
      API: notebookmanager
      TOOL: manual
      RUN: 1
    ports:
      - "9090:9090"
      - "12345:12345"
    volumes:
      - ../../results:/results
      - ../../infrastructure:/infrastructure:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - notebookmanager-network

volumes:
  mysql-data:

networks:
  notebookmanager-network:
    driver: bridge
