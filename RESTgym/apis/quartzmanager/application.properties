# Quartz Manager Configuration for RESTgym
server.port=8080
server.max-http-header-size=65536

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:quartzmanager
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false

# JPA/Hibernate
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Quartz configuration
spring.quartz.job-store-type=memory
spring.quartz.properties.org.quartz.threadPool.threadCount=5

# Quartz Manager configuration
quartz-manager.jobClassPackages=it.fabioformosa.quartzmanager.jobs
quartz-manager.oas.enabled=true

# Security configuration
quartz-manager.security.jwt.secret=mySecretKey123456789012345678901234567890
quartz-manager.security.jwt.expiration-in-sec=28800
quartz-manager.security.accounts.in-memory.enabled=true
quartz-manager.security.accounts.in-memory.users[0].username=restapitestteam@gmail.com
quartz-manager.security.accounts.in-memory.users[0].password=universe
quartz-manager.security.accounts.in-memory.users[0].roles[0]=ADMIN

# Logging
logging.level.it.fabioformosa=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=DEBUG
logging.level.org.springframework.boot.autoconfigure=DEBUG
logging.level.org.springframework.beans.factory=DEBUG
logging.level.org.quartz=WARN
