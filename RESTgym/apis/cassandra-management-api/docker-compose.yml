version: '3.8'

services:
  cassandra-management-api:
    build:
      context: ../..
      dockerfile: apis/cassandra-management-api/Dockerfile
    container_name: cassandra-management-api-restgym
    environment:
      - API=cassandra-management-api
      - TOOL=manual
      - RUN=1
      - USE_MGMT_API=true
      - MGMT_API_LISTEN_TCP_PORT=8080
      - CASSANDRA_CLUSTER_NAME=RESTgym_Cluster
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_RACK=rack1
    ports:
      - "9092:9090"    
      - "12347:12345"  
      - "8081:8080"    
      - "9042:9042"    
    networks:
      - cassandra-network
    volumes:
      - ../../results:/results
      - ../../infrastructure:/infrastructure:ro
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'SELECT release_version FROM system.local' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

networks:
  cassandra-network:
    driver: bridge

volumes:
  cassandra-data:
