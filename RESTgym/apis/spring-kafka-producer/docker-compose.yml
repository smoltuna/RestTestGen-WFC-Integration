version: '3.8'

services:
  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: spring-kafka-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - spring-kafka-network

  # Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: spring-kafka-broker
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - spring-kafka-network

  # Schema Registry
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: spring-kafka-schema-registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - spring-kafka-network

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.15
    container_name: spring-kafka-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - spring-kafka-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  # Producer API
  producer:
    build:
      context: ../../
      dockerfile: ./apis/spring-kafka-producer/Dockerfile
    container_name: spring-kafka-producer-restgym
    depends_on:
      - kafka
      - schema-registry
    ports:
      - "9090:9090"  # mitmproxy
      - "12345:12345"  # JaCoCo
    environment:
      API: spring-kafka-producer
      TOOL: manual
      RUN: 1
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      SCHEMA_REGISTRY_HOST: schema-registry
      SCHEMA_REGISTRY_PORT: 8081
    volumes:
      - ../../results:/results
      - ../../infrastructure:/infrastructure:ro
    networks:
      - spring-kafka-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  # Publisher API
  publisher:
    build:
      context: ../../
      dockerfile: ./apis/spring-kafka-publisher/Dockerfile
    container_name: spring-kafka-publisher-restgym
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "9091:9090"  # mitmproxy
      - "12346:12345"  # JaCoCo
    environment:
      API: spring-kafka-publisher
      TOOL: manual
      RUN: 1
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_REST_PORT: 9200
    volumes:
      - ../../results:/results
      - ../../infrastructure:/infrastructure:ro
    networks:
      - spring-kafka-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

networks:
  spring-kafka-network:
    driver: bridge
