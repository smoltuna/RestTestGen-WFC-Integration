version: '3.8'

services:
  liferay-db:
    image: postgres:13
    container_name: liferay-postgres
    environment:
      POSTGRES_DB: lportal
      POSTGRES_USER: liferay
      POSTGRES_PASSWORD: liferay
    volumes:
      - liferay-db-data:/var/lib/postgresql/data
    networks:
      - liferay-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liferay"]
      interval: 10s
      timeout: 5s
      retries: 5

  liferay:
    image: restgym-liferay:latest
    container_name: restgym-liferay
    depends_on:
      liferay-db:
        condition: service_healthy
    environment:
      LIFERAY_JDBC_PERIOD_DEFAULT_PERIOD_JNDI_PERIOD_NAME: ""
      LIFERAY_JDBC_PERIOD_DEFAULT_PERIOD_DRIVER_UPPERCASEC_LASS_UPPERCASEN_AME: "org.postgresql.Driver"
      LIFERAY_JDBC_PERIOD_DEFAULT_PERIOD_URL: "jdbc:postgresql://liferay-db:5432/lportal"
      LIFERAY_JDBC_PERIOD_DEFAULT_PERIOD_USERNAME: "liferay"
      LIFERAY_JDBC_PERIOD_DEFAULT_PERIOD_PASSWORD: "liferay"
      # Configurazione per RESTgym
      TOOL: ${TOOL:-manual}
      RUN: ${RUN:-1}
    ports:
      - "9090:9090"  # MITMProxy - porta per RESTgym
      - "12345:12345"  # JaCoCo
    volumes:
      - ../../infrastructure:/infrastructure
      - ../../results/liferay:/results/liferay
      - ./classes:/api/classes
      - liferay-data:/opt/liferay/data
    networks:
      - liferay-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/jsonws || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  liferay-db-data:
  liferay-data:

networks:
  liferay-network:
    driver: bridge
