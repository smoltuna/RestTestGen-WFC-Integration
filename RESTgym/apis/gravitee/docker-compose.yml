version: '3.8'

networks:
  gravitee-net:
    name: gravitee-restgym

volumes:
  data-mongo:
  results:

services:
  mongodb:
    image: mongo:6.0
    container_name: gravitee-mongodb
    restart: always
    volumes:
      - data-mongo:/data/db
    healthcheck:
      test: mongosh --eval 'db.runCommand({serverStatus:1}).ok' --quiet | grep 1
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - gravitee-net

  gravitee-restgym:
    build:
      context: ../..
      dockerfile: apis/gravitee/Dockerfile
    image: gravitee-gravitee:latest
    container_name: gravitee-restgym
    restart: always
    ports:
      - "9090:9090"   # mitmproxy (API access)
      - "12345:12345" # JaCoCo TCP server
      - "8083:8083"   # Gravitee Management API (direct access)
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - API=gravitee
      - TOOL=manual
      - RUN=1
      - gravitee_management_mongodb_uri=mongodb://mongodb:27017/gravitee?serverSelectionTimeoutMS=5000&connectTimeoutMS=5000&socketTimeoutMS=5000
      - gravitee_ratelimit_mongodb_uri=mongodb://mongodb:27017/gravitee?serverSelectionTimeoutMS=5000&connectTimeoutMS=5000&socketTimeoutMS=5000
      - gravitee_analytics_type=none
    volumes:
      - results:/results
      # Removed ./infrastructure mount to preserve image's JaCoCo and mitmproxy tools
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/management/organizations/DEFAULT/console"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - gravitee-net
