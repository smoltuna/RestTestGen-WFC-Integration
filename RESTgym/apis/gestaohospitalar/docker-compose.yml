version: '3.8'

services:
  mongodb:
    image: mongo:4.4
    container_name: gestaohospitalar-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=HospitalDB
    volumes:
      - ./database:/docker-entrypoint-initdb.d:ro
      - mongodb-data:/data/db
    networks:
      - gestaohospitalar-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/HospitalDB --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: apis/gestaohospitalar/Dockerfile
    container_name: gestaohospitalar-restgym
    ports:
      - "9090:9090"
      - "12345:12345"
      - "8080:8080"
    environment:
      - API=gestaohospitalar
      - TOOL=manual
      - RUN=1
      - SPRING_DATA_MONGODB_HOST=mongodb
      - SPRING_DATA_MONGODB_PORT=27017
      - SPRING_DATA_MONGODB_DATABASE=HospitalDB
    volumes:
      - ../../results:/results
      - ../../infrastructure:/infrastructure:ro
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - gestaohospitalar-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/hospitais/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

volumes:
  mongodb-data:

networks:
  gestaohospitalar-network:
    driver: bridge
