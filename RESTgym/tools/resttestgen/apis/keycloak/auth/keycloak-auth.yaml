# OAuth2 via OIDC token endpoint
# IMPORTANT: Using 'admin' account which is protected and cannot be deleted/modified by tests
# Unlike 'restapitestteam@gmail.com', admin account won't cause authentication loops
auth:
  - name: admin
    loginEndpointAuth:
      payloadRaw: "grant_type=password&client_id=admin-cli&username=admin&password=admin"

authTemplate:
  baseUrl: http://localhost:9094
  loginEndpointAuth:
    endpoint: /realms/master/protocol/openid-connect/token
    verb: POST
    contentType: application/x-www-form-urlencoded
    token:
      extractFromField: /access_token
      httpHeaderName: Authorization
      headerPrefix: "Bearer "
