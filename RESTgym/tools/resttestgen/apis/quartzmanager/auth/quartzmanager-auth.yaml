# WFC Authentication Configuration for QuartzManager
# JWT via login endpoint with form-urlencoded credentials

auth:
  - name: admin
    loginEndpointAuth:
      payloadRaw: "username=restapitestteam@gmail.com&password=universe"

authTemplate:
  baseUrl: http://localhost:8081
  loginEndpointAuth:
    endpoint: /quartz-manager/auth/login
    verb: POST
    contentType: application/x-www-form-urlencoded
    token:
      extractFromField: /accessToken
      httpHeaderName: Authorization
      headerPrefix: "Bearer "
