openapi: 3.0.1
info:
  description: "This is a Restful service for operating Apache Cassandra.  You can\
    \ find out more about the Management API on [Github](http://github.com/k8ssandra/management-api-for-apache-cassandra)"
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: Management API for Apache Cassandra™
  version: "0.1"
servers:
- url: /
paths:
  /api/v0/lifecycle/configure:
    post:
      description: Configure Cassandra/DSE. Will fail if Cassandra/DSE is already
        started
      operationId: configureNode
      parameters:
      - explode: true
        in: query
        name: profile
        required: false
        schema:
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              type: string
          application/yaml:
            schema:
              type: string
          text/yaml:
            schema:
              type: string
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Cassandra configured successfully
        "400":
          content:
            text/plain:
              example: config missing
              schema:
                type: string
          description: Cassandra configure request is missing required data or has
            invalid data
        "406":
          content:
            text/plain:
              example: "Cassandra is running, try /api/v0/lifecycle/stop first"
              schema:
                type: string
          description: Cassandra can't be configured while running
        "500":
          description: Error configuring Cassandra
      x-content-type: application/json
      x-accepts: text/plain
  /api/v0/lifecycle/pid:
    get:
      description: "The PID of Cassandra/DSE, if it's running"
      operationId: getPID
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Cassandra Process ID
        "204":
          description: No Cassandra Process running
        "500":
          content:
            text/plain:
              example: error message
              schema:
                type: string
          description: Error finding Cassandra Process
      x-accepts: text/plain
  /api/v0/lifecycle/start:
    post:
      description: Starts Cassandra/DSE
      operationId: startNode
      parameters:
      - explode: true
        in: query
        name: profile
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: replace_ip
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: replace_consistency
        required: false
        schema:
          type: string
        style: form
      responses:
        "201":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Cassandra started successfully
        "202":
          description: Cassandra already running and can connect
        "204":
          description: Cassandra already running but can't connect
        "206":
          description: Cassandra process not found but can connect
        "400":
          content:
            text/plain:
              example: "Invalid replace IP passed: 0.0.0.0.0"
              schema:
                type: string
          description: Invalid parameters
        "420":
          content:
            text/plain:
              example: Error starting Cassandra
              schema:
                type: string
          description: Cassandra could not start successfully
        "500":
          content:
            text/plain:
              example: error message
              schema:
                type: string
          description: Error trying to start Cassandra
      x-accepts: text/plain
  /api/v0/lifecycle/stop:
    post:
      description: Stops Cassandra/DSE. Keeps node from restarting automatically until
        /start is called
      operationId: stopNode
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Cassandra stopped successfully
        "500":
          content:
            text/plain:
              example: Killing Cassandra Failed
              schema:
                type: string
          description: Cassandra not stopped successfully
      x-accepts: text/plain
  /api/v0/metadata/endpoints:
    get:
      operationId: getEndpointStates
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndpointStates'
          description: Endpoint states'
      summary: Returns this nodes view of the endpoint states of nodes
      x-accepts: application/json
  /api/v0/metadata/localdc:
    get:
      operationId: getLocalDataCenter
      responses:
        "200":
          content:
            text/plain:
              example: datacenter1
              schema:
                type: string
          description: Local datacenter'
      summary: Returns the DataCenter the local node belongs to
      x-accepts: text/plain
  /api/v0/metadata/versions/features:
    get:
      operationId: getFeatureSet
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureSet'
          description: Local datacenter'
      summary: Returns the management-api featureSet
      x-accepts: application/json
  /api/v0/metadata/versions/release:
    get:
      operationId: getReleaseVersion
      responses:
        "200":
          content:
            text/plain:
              example: 4.0.1
              schema:
                type: string
          description: Cassandra version
      summary: Returns the Cassandra release version
      x-accepts: text/plain
  /api/v0/ops/auth/role:
    delete:
      operationId: dropRole
      parameters:
      - explode: true
        in: query
        name: username
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Role dropped
        "400":
          content:
            text/plain:
              example: Username is empty
              schema:
                type: string
          description: Username is empty
      summary: Drops a user role
      x-accepts: text/plain
    get:
      operationId: listRoles
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Role'
                type: array
          description: List of roles
        "400":
          content:
            text/plain:
              example: Username is empty
              schema:
                type: string
          description: Username is empty
      summary: Lists existing user rules
      x-accepts: application/json
    post:
      operationId: createRole
      parameters:
      - explode: true
        in: query
        name: username
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: is_superuser
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: can_login
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: password
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Role created
        "400":
          content:
            text/plain:
              example: Username is empty
              schema:
                type: string
          description: Username and/or password is empty
      summary: Creates a new user role
      x-accepts: text/plain
  /api/v0/ops/executor/job:
    get:
      operationId: getJobStatus
      parameters:
      - explode: true
        in: query
        name: job_id
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
          description: Map of job details
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
          description: Job not found
      summary: Returns Job details for the supplied Job ID
      x-accepts: application/json
  /api/v0/ops/keyspace:
    get:
      operationId: listKeyspaces
      parameters:
      - explode: true
        in: query
        name: keyspaceName
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
              - system_schema
              - system
              - system_auth
              - system_distributed
              - system_traces
              schema:
                items:
                  type: string
                type: array
          description: List of Keyspaces
      summary: List the keyspaces existing in the cluster
      x-accepts: application/json
  /api/v0/ops/keyspace/alter:
    post:
      operationId: alterKeyspace
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrAlterKeyspaceRequest'
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Keyspace Replication Settings altered successfully
        "400":
          content:
            text/plain:
              example: Altering Keyspace failed. Non-empty 'keyspace_name' must be
                provided
              schema:
                type: string
          description: Keyspace name or Replication Settings not provided
      summary: Alter the replication settings of an existing keyspace
      x-content-type: application/json
      x-accepts: text/plain
  /api/v0/ops/keyspace/cleanup:
    post:
      operationId: cleanup
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeyspaceRequest'
      responses:
        "200":
          content:
            text/plain:
              example: d69d1d95-9348-4460-95d2-ae342870fade
              schema:
                type: string
          description: Job ID for keyspace cleanup process
      summary: "Triggers the immediate cleanup of keys no longer belonging to a node.\
        \ By default, clean all keyspaces. This operation is blocking and will return\
        \ the executed job after finishing."
      x-content-type: application/json
      x-accepts: text/plain
  /api/v0/ops/keyspace/create:
    post:
      operationId: createKeyspace
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrAlterKeyspaceRequest'
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Keyspace created successfully
        "400":
          content:
            text/plain:
              example: Keyspace creation failed. Non-empty 'keyspace_name' must be
                provided
              schema:
                type: string
          description: Keyspace name or Replication Settings not provided
      summary: Create a new keyspace with the given name and replication settings
      x-content-type: application/json
      x-accepts: text/plain
  /api/v0/ops/keyspace/refresh:
    post:
      operationId: refresh
      parameters:
      - explode: true
        in: query
        name: keyspaceName
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: table
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: SSTables loaded successfully
        "400":
          content:
            text/plain:
              example: Must provide a keyspace name
              schema:
                type: string
          description: Keyspace name or Table name not provided
      summary: Load newly placed SSTables to the system without restart
      x-accepts: text/plain
  /api/v0/ops/keyspace/replication:
    get:
      operationId: replication
      parameters:
      - explode: true
        in: query
        name: keyspaceName
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              example: "{\"class\":\"org.apache.cassandra.locator.SimpleStrategy\"\
                ,\"replication_factor\":\"2\"}"
              schema:
                type: string
          description: Keyspace Replication Settings
        "400":
          content:
            text/plain:
              example: Get keyspace replication failed. Non-empty 'keyspaceName' must
                be provided
              schema:
                type: string
          description: Keyspace name not provided
        "404":
          content:
            text/plain:
              example: Get keyspace replication failed. Keyspace 'my_keyspace' does
                not exist.
              schema:
                type: string
          description: Keyspace name not found
      summary: Get the replication settings of an existing keyspace
      x-accepts: application/json
  /api/v0/ops/node/assassinate:
    post:
      operationId: assassinate
      parameters:
      - explode: true
        in: query
        name: address
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Cassandra node assasinated successfully
        "400":
          content:
            text/plain:
              example: Address must be provided
              schema:
                type: string
          description: Cassandra node assasination request missing address
      summary: Forcefully remove a dead node without re-replicating any data. Use
        as a last resort if you cannot removenode
      x-accepts: text/plain
  /api/v0/ops/node/compaction:
    post:
      operationId: setCompactionThroughput
      parameters:
      - explode: true
        in: query
        name: value
        required: false
        schema:
          format: int32
          type: integer
        style: form
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Cassandra compaction throughput set successfully
      summary: "Set the MB/s throughput cap for compaction in the system, or 0 to\
        \ disable throttling"
      x-accepts: text/plain
  /api/v0/ops/node/decommission:
    post:
      operationId: decommission
      parameters:
      - explode: true
        in: query
        name: force
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Cassandra node decommissioned successfully
      summary: Decommission the *node I am connecting to*
      x-accepts: text/plain
  /api/v0/ops/node/drain:
    post:
      operationId: drain
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Cassandra node drained successfully
      summary: Drain the node (stop accepting writes and flush all tables)
      x-accepts: text/plain
  /api/v0/ops/node/encryption/internode/truststore/reload:
    post:
      operationId: reloadTruststore
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Truststore reloaded successfully
        "400":
          content:
            text/plain:
              example: Reloading the truststore manually is only possible on DSE
              schema:
                type: string
          description: Unsupported Operation
      summary: reload truststore
      x-accepts: text/plain
  /api/v0/ops/node/fullquerylogging:
    get:
      operationId: isFullQueryLogEnabled
      responses:
        "200":
          content:
            application/json:
              example: "{\"entity\":false,\"variant\":{\"language\":null,\"mediaType\"\
                :{\"type\":\"application\",\"subtype\":\"json\",\"parameters\":{},\"\
                wildcardType\":false,\"wildcardSubtype\":false},\"encoding\":null,\"\
                languageString\":null},\"annotations\":[],\"mediaType\":{\"type\"\
                :\"application\",\"subtype\":\"json\",\"parameters\":{},\"wildcardType\"\
                :false,\"wildcardSubtype\":false},\"language\":null,\"encoding\":null}"
              schema:
                type: string
          description: Full Query enabled
      summary: Get whether full query logging is enabled.
      x-accepts: application/json
    post:
      operationId: setFullQuerylog
      parameters:
      - explode: true
        in: query
        name: enabled
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Full Query Logging set successfully
      summary: Enable or disable full query logging facility.
      x-accepts: text/plain
  /api/v0/ops/node/hints/truncate:
    post:
      operationId: truncateHints
      parameters:
      - explode: true
        in: query
        name: host
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Cassandra node hints truncated successfully
      summary: "Truncate all hints on the local node, or truncate hints for the endpoint(s)\
        \ specified."
      x-accepts: text/plain
  /api/v0/ops/node/logging:
    post:
      operationId: setLoggingLevel
      parameters:
      - explode: true
        in: query
        name: target
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: rawLevel
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Cassandra logging level set successfully
      summary: Set the log level threshold for a given component or class. Will reset
        to the initial configuration if called with no parameters.
      x-accepts: text/plain
  /api/v0/ops/node/move:
    post:
      operationId: move
      parameters:
      - explode: true
        in: query
        name: newToken
        required: false
        schema:
          type: string
        style: form
      responses:
        "202":
          content:
            text/plain:
              example: d69d1d95-9348-4460-95d2-ae342870fade
              schema:
                type: string
          description: Job ID for successfully scheduled Cassandra node move request
        "400":
          content:
            text/plain:
              example: newToken must be specified
              schema:
                type: string
          description: Missing required newToken parameter
      summary: Move node on the token ring to a new token. This operation returns
        immediately with a job id.
      x-accepts: text/plain
  /api/v0/ops/node/repair:
    post:
      operationId: repair
      requestBody:
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/RepairRequest'
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Nodetool repair executed successfully
        "400":
          content:
            text/plain:
              example: keyspaceName must be specified
              schema:
                type: string
          description: Repair request missing Keyspace name
      summary: Execute a nodetool repair operation
      x-content-type: '*/*'
      x-accepts: text/plain
  /api/v0/ops/node/schema/reload:
    post:
      operationId: reloadLocalSchema
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Cassandra node schema reloaded successfully
      summary: Reload local node schema from system tables
      x-accepts: text/plain
  /api/v0/ops/node/schema/reset:
    post:
      operationId: resetLocalSchema
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Cassandra node scheam resynced successfully
      summary: Reset node's local schema and resync
      x-accepts: text/plain
  /api/v0/ops/node/search/rebuildIndex:
    post:
      operationId: searchIndexRebuild
      parameters:
      - explode: true
        in: query
        name: keyspace
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: table
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          description: DSE Search index rebuild has started
        "400":
          description: An attempt is made to rebuild the index on a server type (Cassandra)
            that does not support it
        "404":
          description: An attempt is made to rebuild a non-existing index
        "500":
          description: Internal error occurs that disallow us to determine if this
            operation is possible
      summary: Rebuild a DSE Search index
      x-accepts: application/json
  /api/v0/ops/node/snapshots:
    delete:
      operationId: clearSnapshots
      parameters:
      - explode: true
        in: query
        name: snapshotNames
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      - explode: true
        in: query
        name: keyspaces
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Snapshots cleared successfully
      summary: Clear snapshots
      x-accepts: text/plain
    get:
      operationId: getSnapshotDetails
      parameters:
      - explode: true
        in: query
        name: snapshotNames
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      - explode: true
        in: query
        name: keyspaces
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotDetails'
          description: Cassandra snapshot details. Use 'null' values for query parameters
            to exclude result filtering against the parameter.
      summary: Retrieve snapshot details
      x-accepts: application/json
    post:
      operationId: takeSnapshot
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TakeSnapshotRequest'
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Snapshot created successfully
        "400":
          content:
            text/plain:
              example: "When specifying keyspace_tables, specifying keyspaces is not\
                \ allowed"
              schema:
                type: string
          description: Invalid snapshot request
      summary: Take a snapshot
      x-content-type: application/json
      x-accepts: text/plain
  /api/v0/ops/node/streaminfo:
    get:
      operationId: getStreamInfo
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamingInfo'
          description: Cassandra streaming status info
      summary: Retrieve Streaming status information
      x-accepts: application/json
  /api/v0/ops/seeds/reload:
    post:
      operationId: seedReload
      responses:
        "200":
          content:
            application/json:
              example: "[127.0.0.1, 127.0.0.2]"
              schema:
                type: string
          description: List of new seeds after reload
      summary: Reload the seed node list from the seed provider
      x-accepts: application/json
  /api/v0/ops/tables:
    get:
      operationId: listTables
      parameters:
      - explode: true
        in: query
        name: keyspaceName
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
              - table_1
              - table_2
              schema:
                items:
                  type: string
                type: array
          description: Table list
        "400":
          content:
            text/plain:
              example: List tables failed. Non-empty 'keyspaceName' must be provided
              schema:
                type: string
          description: Keyspace name not provided
      summary: List the table names in the given keyspace
      x-accepts: application/json
  /api/v0/ops/tables/compact:
    post:
      operationId: compact
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompactRequest'
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Table compaction successful
        "400":
          content:
            text/plain:
              example: "Invalid option combination: Can not use split-output here"
              schema:
                type: string
          description: Invalid table compaction request
      summary: Force a (major) compaction on one or more tables or user-defined compaction
        on given SSTables
      x-content-type: application/json
      x-accepts: text/plain
  /api/v0/ops/tables/create:
    post:
      operationId: createTable
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTableRequest'
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Table creation successful
        "400":
          content:
            text/plain:
              example: "Table creation failed: some failure message"
              schema:
                type: string
          description: Table creation failed
      summary: Create a new table in an existing keyspace
      x-content-type: application/json
      x-accepts: text/plain
  /api/v0/ops/tables/flush:
    post:
      operationId: flush
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeyspaceRequest'
      responses:
        "200":
          content:
            text/plain:
              example: OK
              schema:
                type: string
          description: Table flush successful
