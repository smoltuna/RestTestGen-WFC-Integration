services:
  mongodb:
    image: mongo:latest
    container_name: flightsearchapi-mongodb
    environment:
      - MONGO_INITDB_DATABASE=flightdatabase
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - restgym-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  flightsearchapi:
    build:
      context: ../..
      dockerfile: apis/flightsearchapi/Dockerfile
    container_name: flightsearchapi-restgym
    environment:
      - API=flightsearchapi
      - TOOL=manual
      - RUN=1
    ports:
      - "9091:9090"   # mitmproxy (public API access)
      - "12346:12345" # JaCoCo coverage port
    volumes:
      - ../../results:/results
      - ../../infrastructure:/infrastructure:ro
    networks:
      - restgym-network
    depends_on:
      mongodb:
        condition: service_healthy

networks:
  restgym-network:
    driver: bridge

volumes:
  mongodb_data:
